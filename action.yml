name: 'Skyhook Kustomize Smart Deploy'
description: 'Complete kustomize deployment with GitOps detection and metadata extraction'
author: 'Skyhook'

branding:
  icon: 'package'
  color: 'purple'

inputs:
  working_directory:
    description: 'Working directory for operations'
    required: false
    default: '.'
  overlay_dir:
    description: 'Path to kustomize overlay directory (relative to working_directory)'
    required: true
  service_name:
    description: 'Service name'
    required: true
  image:
    description: 'Container image (e.g., registry.io/app or registry.io/app:v1.2.3)'
    required: false
  tag:
    description: 'Image tag (e.g., v1.2.3, latest, sha-abc123)'
    required: false
  images_json:
    description: 'Multiple images as JSON array: [{"name":"registry.io/app","newTag":"v1.2.3"}]'
    required: false
  ensure_service_image:
    description: 'Ensure an image entry for service_name:version is included (adds it if missing)'
    required: false
    default: 'false'
  update_all_images:
    description: 'Apply the provided tag to every image entry in kustomization.yaml. Useful for monorepo releases where all services share a version. Mutually exclusive with image/images_json/ensure_service_image. Requires tag input.'
    required: false
    default: 'false'
  environment:
    description: 'Environment name'
    required: true
  actor:
    description: 'User deploying (defaults to github.actor)'
    required: false
    default: ''
  run_id:
    description: 'Run ID for tracking (defaults to github.run_id)'
    required: false
    default: ''
  detect_gitops:
    description: 'Auto-detect GitOps mode from manifests'
    required: false
    default: 'true'
  force_mode:
    description: 'Force deployment mode (gitops, kubectl, or auto)'
    required: false
    default: 'auto'
  commit_message:
    description: 'Commit message for GitOps (has defaults)'
    required: false
  create_namespace:
    description: 'Create namespace if it does not exist'
    required: false
    default: 'true'
  wait_timeout:
    description: 'Timeout for waiting on deployments (seconds)'
    required: false
    default: '120'
  env_patches:
    description: 'Environment file patches (JSON format matching patch-env-files, e.g., {"container.env":{"SENTRY_RELEASE":"v1.2.3"}})'
    required: false
  dry_run:
    description: 'If true, render manifests and detect mode but skip the actual deploy (no GitOps commit, no kubectl apply). Useful for rehearsal/preview runs.'
    required: false
    default: 'false'

outputs:
  mode:
    description: 'Deployment mode used (gitops or kubectl)'
    value: ${{ steps.mode.outputs.mode }}
  namespace:
    description: 'Kubernetes namespace'
    value: ${{ steps.inspect.outputs.namespace }}
  deployment:
    description: 'Primary deployment name'
    value: ${{ steps.inspect.outputs.primary_deployment }}
  workloads_json:
    description: 'JSON array of deployed workloads: [{kind,name,namespace}]'
    value: ${{ steps.inspect.outputs.workloads_json }}
  managed_by:
    description: 'Value of managed-by label if found'
    value: ${{ steps.detect.outputs.managed_by }}

runs:
  using: 'composite'
  steps:
    - name: Validate inputs
      shell: bash
      run: |
        if [ ! -d "${{ inputs.working_directory }}/${{ inputs.overlay_dir }}" ]; then
          echo "::error::Overlay directory not found: ${{ inputs.working_directory }}/${{ inputs.overlay_dir }}"
          exit 1
        fi

        if [ ! -f "${{ inputs.working_directory }}/${{ inputs.overlay_dir }}/kustomization.yaml" ]; then
          echo "::error::No kustomization.yaml found in overlay directory"
          exit 1
        fi

    - name: Resolve image inputs
      id: images
      shell: bash
      run: |
        IMAGE="${{ inputs.image }}"
        TAG="${{ inputs.tag }}"
        IMAGES_JSON='${{ inputs.images_json }}'
        SERVICE_NAME="${{ inputs.service_name }}"
        ENSURE="${{ inputs.ensure_service_image }}"
        UPDATE_ALL="${{ inputs.update_all_images }}"

        # update_all_images: rewrite newTag on every entry in kustomization.yaml's images[]
        if [ "$UPDATE_ALL" = "true" ]; then
          KUSTOMIZATION="${{ inputs.working_directory }}/${{ inputs.overlay_dir }}/kustomization.yaml"

          # Mutually exclusive with image/images_json/ensure_service_image
          CONFLICTS=()
          [ -n "$IMAGE" ] && CONFLICTS+=("image")
          [ -n "$IMAGES_JSON" ] && CONFLICTS+=("images_json")
          [ "$ENSURE" = "true" ] && CONFLICTS+=("ensure_service_image")
          if [ ${#CONFLICTS[@]} -gt 0 ]; then
            echo "::error::update_all_images=true is mutually exclusive with: ${CONFLICTS[*]}"
            exit 1
          fi

          if [ -z "$TAG" ]; then
            echo "::error::update_all_images=true requires tag input"
            exit 1
          fi
          if ! command -v yq >/dev/null 2>&1; then
            echo "::error::update_all_images=true requires yq to read kustomization.yaml"
            exit 1
          fi
          if ! command -v jq >/dev/null 2>&1; then
            echo "::error::update_all_images=true requires jq"
            exit 1
          fi
          if [ ! -f "$KUSTOMIZATION" ]; then
            echo "::error::kustomization.yaml not found at $KUSTOMIZATION"
            exit 1
          fi

          # Reject digest-pinned entries — rewriting newTag would not take effect and is misleading
          DIGEST_COUNT=$(yq -o=json '.images // []' "$KUSTOMIZATION" | jq '[.[] | select(.digest)] | length')
          if [ "$DIGEST_COUNT" -gt 0 ]; then
            echo "::error::update_all_images=true is incompatible with digest-pinned image entries (found $DIGEST_COUNT in $KUSTOMIZATION). Remove digest pins or use image/images_json instead."
            exit 1
          fi

          NEW_IMAGES_JSON=$(yq -o=json '.images // []' "$KUSTOMIZATION" | jq -c \
            --arg tag "$TAG" \
            '[.[] | {name: .name} + (if .newName then {newName: .newName} else {} end) + {newTag: $tag}]')

          COUNT=$(echo "$NEW_IMAGES_JSON" | jq 'length')
          if [ "$COUNT" = "0" ]; then
            echo "::error::update_all_images=true but kustomization.yaml has no images[] entries"
            exit 1
          fi

          echo "image=" >> $GITHUB_OUTPUT
          echo "tag=" >> $GITHUB_OUTPUT
          echo "images_json=$NEW_IMAGES_JSON" >> $GITHUB_OUTPUT
          echo "✓ update_all_images: bumped $COUNT image(s) to '$TAG'"
          exit 0
        fi

        # If flag is not true, pass through unchanged
        if [ "$ENSURE" != "true" ]; then
          echo "image=$IMAGE" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "images_json=$IMAGES_JSON" >> $GITHUB_OUTPUT
          exit 0
        fi

        # Parse current image name and version from inputs
        CURRENT_NAME=""
        VERSION=""

        if [ -n "$IMAGES_JSON" ]; then
          # images_json mode: check if service_name already present
          if echo "$IMAGES_JSON" | jq -e --arg svc "$SERVICE_NAME" '.[] | select(.name == $svc)' > /dev/null 2>&1; then
            echo "✓ service_name '$SERVICE_NAME' already in images_json"
            echo "image=" >> $GITHUB_OUTPUT
            echo "tag=" >> $GITHUB_OUTPUT
            echo "images_json=$IMAGES_JSON" >> $GITHUB_OUTPUT
            exit 0
          fi
          # Not present — append service_name entry; prefer explicit tag input, fall back to first entry's tag
          if [ -n "$TAG" ]; then
            VERSION="$TAG"
          else
            VERSION=$(echo "$IMAGES_JSON" | jq -r '.[0].newTag')
          fi
          IMAGES_JSON=$(echo "$IMAGES_JSON" | jq -c --arg svc "$SERVICE_NAME" --arg ver "$VERSION" '. + [{"name": $svc, "newTag": $ver}]')
          echo "image=" >> $GITHUB_OUTPUT
          echo "tag=" >> $GITHUB_OUTPUT
          echo "images_json=$IMAGES_JSON" >> $GITHUB_OUTPUT
          echo "✓ Appended service_name '$SERVICE_NAME' with tag '$VERSION' to images_json"
          exit 0
        fi

        if [ -n "$IMAGE" ]; then
          # Parse image — may contain tag after colon
          # Use regex where tag = last colon-segment with no slash (handles registry ports like host:5000/app:v1)
          if [[ "$IMAGE" =~ ^(.+):([^/]+)$ ]]; then
            CURRENT_NAME="${BASH_REMATCH[1]}"
            VERSION="${BASH_REMATCH[2]}"
          else
            CURRENT_NAME="$IMAGE"
            VERSION="$TAG"
          fi

          # If image name already matches service_name, no change needed
          if [ "$CURRENT_NAME" = "$SERVICE_NAME" ]; then
            echo "✓ Image already matches service_name"
            echo "image=$IMAGE" >> $GITHUB_OUTPUT
            echo "tag=$TAG" >> $GITHUB_OUTPUT
            echo "images_json=" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Convert to images_json with both original and service_name
          IMAGES_JSON=$(jq -n -c \
            --arg orig "$CURRENT_NAME" \
            --arg svc "$SERVICE_NAME" \
            --arg ver "$VERSION" \
            '[{"name": $orig, "newTag": $ver}, {"name": $svc, "newTag": $ver}]')
          echo "image=" >> $GITHUB_OUTPUT
          echo "tag=" >> $GITHUB_OUTPUT
          echo "images_json=$IMAGES_JSON" >> $GITHUB_OUTPUT
          echo "✓ Converted to images_json with both '$CURRENT_NAME' and '$SERVICE_NAME' at tag '$VERSION'"
          exit 0
        fi

        # No image/images_json provided — if tag exists, use service_name as image
        if [ -n "$TAG" ]; then
          KUSTOMIZATION="${{ inputs.working_directory }}/${{ inputs.overlay_dir }}/kustomization.yaml"
          # Check if kustomization.yaml has an existing newName for this service_name
          EXISTING_NEW_NAME=""
          if [ -f "$KUSTOMIZATION" ]; then
            if command -v yq >/dev/null 2>&1; then
              EXISTING_NEW_NAME=$(yq ".images[] | select(.name == \"$SERVICE_NAME\") | .newName // \"\"" "$KUSTOMIZATION" 2>/dev/null || echo "")
            else
              echo "::warning::yq not found — cannot check for existing newName in kustomization.yaml"
            fi
          fi

          if [ -n "$EXISTING_NEW_NAME" ]; then
            # Preserve the existing newName mapping
            IMAGES_JSON=$(jq -n -c \
              --arg svc "$SERVICE_NAME" \
              --arg newName "$EXISTING_NEW_NAME" \
              --arg ver "$TAG" \
              '[{"name": $svc, "newName": $newName, "newTag": $ver}]')
            echo "✓ Created images_json from service_name '$SERVICE_NAME' with existing newName '$EXISTING_NEW_NAME' and tag '$TAG'"
          else
            IMAGES_JSON=$(jq -n -c \
              --arg svc "$SERVICE_NAME" \
              --arg ver "$TAG" \
              '[{"name": $svc, "newTag": $ver}]')
            echo "✓ Created images_json from service_name '$SERVICE_NAME' with tag '$TAG'"
          fi
          echo "image=" >> $GITHUB_OUTPUT
          echo "tag=" >> $GITHUB_OUTPUT
          echo "images_json=$IMAGES_JSON" >> $GITHUB_OUTPUT
          exit 0
        fi

        # Nothing to do — pass through
        echo "image=$IMAGE" >> $GITHUB_OUTPUT
        echo "tag=$TAG" >> $GITHUB_OUTPUT
        echo "images_json=$IMAGES_JSON" >> $GITHUB_OUTPUT

    - name: Update kustomize manifests
      uses: skyhook-io/kustomize-edit@v1
      with:
        overlay_dir: ${{ inputs.working_directory }}/${{ inputs.overlay_dir }}
        image: ${{ steps.images.outputs.image }}
        tag: ${{ steps.images.outputs.tag }}
        images_json: ${{ steps.images.outputs.images_json }}
        version_label: ${{ inputs.tag }}
        annotations: |
          last-deployed-by=${{ inputs.actor || github.actor }}
          deployment-timestamp=${{ github.event.head_commit.timestamp || github.run_id }}
          deployment-id=${{ inputs.run_id || github.run_id }}
          build.run.url=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        env_patches: ${{ inputs.env_patches }}
    
    - name: Inspect kustomization
      id: inspect
      uses: skyhook-io/kustomize-inspect@v1
      with:
        overlay_dir: ${{ inputs.working_directory }}/${{ inputs.overlay_dir }}
    
    - name: Detect GitOps mode
      id: detect
      if: ${{ inputs.force_mode == 'auto' && inputs.detect_gitops == 'true' }}
      shell: bash
      working-directory: ${{ inputs.working_directory }}/${{ inputs.overlay_dir }}
      run: |
        echo "Detecting deployment mode..."

        # 1) Skyhook layout first: deploy/overlays/<env> -> ../../argocd/<env>.yaml
        ENV="${{ inputs.environment }}"
        ARGOCD_APP_YAML="../../argocd/${ENV}.yaml"
        ARGOCD_APP_YML="../../argocd/${ENV}.yml"
        if [ -f "$ARGOCD_APP_YAML" ] || [ -f "$ARGOCD_APP_YML" ]; then
          if [ -f "$ARGOCD_APP_YAML" ]; then
            echo "✓ Found Argo CD Application manifest: $ARGOCD_APP_YAML"
          else
            echo "✓ Found Argo CD Application manifest: $ARGOCD_APP_YML"
          fi
          echo "managed_by=" >> $GITHUB_OUTPUT
          echo "mode=gitops" >> $GITHUB_OUTPUT
          echo "✓ GitOps mode (deploy/argocd/${ENV}.yaml)"
          exit 0
        fi

        # 2) Fall back to built manifests (app.kubernetes.io/managed-by)
        # Auto-detect helmCharts; pass --enable-helm only when present.
        HELM_FLAG=()
        if command -v yq >/dev/null 2>&1; then
          if yq -e '.helmCharts // [] | length > 0' kustomization.yaml >/dev/null 2>&1; then
            HELM_FLAG=(--enable-helm --load-restrictor=LoadRestrictionsNone)
          fi
        elif grep -qE '^helmCharts:[[:space:]]*$' kustomization.yaml 2>/dev/null; then
          HELM_FLAG=(--enable-helm --load-restrictor=LoadRestrictionsNone)
        fi
        BUILD_RESULT=$(kustomize build "${HELM_FLAG[@]}")
        MANAGED_BY=$(echo "$BUILD_RESULT" | grep "app.kubernetes.io/managed-by:" | head -n1 | sed 's/.*app.kubernetes.io\/managed-by:\s*//' | tr -d '[:space:]' || true)
        echo "managed_by=$MANAGED_BY" >> $GITHUB_OUTPUT

        if [ "$MANAGED_BY" = "argocd" ]; then
          echo "mode=gitops" >> $GITHUB_OUTPUT
          echo "✓ GitOps mode detected (app.kubernetes.io/managed-by: argocd)"
        elif [ "$MANAGED_BY" = "flux" ]; then
          echo "mode=gitops" >> $GITHUB_OUTPUT
          echo "✓ GitOps mode detected (Flux)"
        else
          echo "mode=kubectl" >> $GITHUB_OUTPUT
          echo "✓ Direct deployment mode (kubectl)"
        fi
    
    - name: Set deployment mode
      id: mode
      shell: bash
      run: |
        if [ "${{ inputs.force_mode }}" != "auto" ]; then
          echo "mode=${{ inputs.force_mode }}" >> $GITHUB_OUTPUT
          echo "<> Using forced mode: ${{ inputs.force_mode }}"
        else
          echo "mode=${{ steps.detect.outputs.mode }}" >> $GITHUB_OUTPUT
        fi

    - name: Deployment context
      shell: bash
      run: |
        echo "=================================================="
        echo "🎯 Environment: ${{ inputs.environment }}"
        echo "📁 Overlay: ${{ inputs.overlay_dir }}"
        echo "🚀 Mode: ${{ steps.mode.outputs.mode }}"
        echo "=================================================="

    - name: Deployment plan summary
      shell: bash
      working-directory: ${{ inputs.working_directory }}/${{ inputs.overlay_dir }}
      run: |
        # Auto-detect helmCharts; pass --enable-helm only when present.
        HELM_FLAG=()
        if command -v yq >/dev/null 2>&1; then
          if yq -e '.helmCharts // [] | length > 0' kustomization.yaml >/dev/null 2>&1; then
            HELM_FLAG=(--enable-helm --load-restrictor=LoadRestrictionsNone)
          fi
        elif grep -qE '^helmCharts:[[:space:]]*$' kustomization.yaml 2>/dev/null; then
          HELM_FLAG=(--enable-helm --load-restrictor=LoadRestrictionsNone)
        fi
        KUSTOMIZE_BUILD_RESULT=$(kustomize build "${HELM_FLAG[@]}")
        echo "--- Deployment plan summary ---"
        echo "Deployment mode: ${{ steps.mode.outputs.mode }}"
        echo "KUSTOMIZE_BUILD_RESULT=$KUSTOMIZE_BUILD_RESULT"
        echo "--- Deployment plan summary ---"
        
    # GitOps path: commit changes
    - name: Commit changes for GitOps
      if: ${{ steps.mode.outputs.mode == 'gitops' && inputs.dry_run != 'true' }}
      uses: skyhook-io/git-sync-commit@v1
      with:
        path: ${{ inputs.working_directory }}
        commit_message: ${{ inputs.commit_message || format('Deploy {0} to {1} [skip ci]', inputs.service_name, inputs.environment) }}
        file_pattern: ${{ inputs.overlay_dir }}/*
    
    # Kubectl path: direct apply
    - name: Apply with kubectl
      if: ${{ steps.mode.outputs.mode == 'kubectl' && inputs.dry_run != 'true' }}
      uses: skyhook-io/kustomize-apply@v1
      with:
        overlay_dir: ${{ inputs.working_directory }}/${{ inputs.overlay_dir }}
        namespace: ${{ steps.inspect.outputs.namespace }}
        workloads_json: ${{ steps.inspect.outputs.workloads_json }}
        wait: 'true'
        wait_timeout: ${{ inputs.wait_timeout }}

    # Dry-run path: log which terminal step was skipped and the inputs it would have received.
    # Values are passed via env: rather than ${{ }} interpolation into the shell so untrusted
    # input like commit_message cannot break out of the echo (GH Actions script injection).
    - name: Dry-run notice
      if: ${{ inputs.dry_run == 'true' }}
      shell: bash
      env:
        MODE: ${{ steps.mode.outputs.mode }}
        WORKING_DIRECTORY: ${{ inputs.working_directory }}
        OVERLAY_DIR: ${{ inputs.overlay_dir }}
        COMMIT_MESSAGE: ${{ inputs.commit_message || format('Deploy {0} to {1} [skip ci]', inputs.service_name, inputs.environment) }}
        NAMESPACE: ${{ steps.inspect.outputs.namespace }}
        WORKLOADS_JSON: ${{ steps.inspect.outputs.workloads_json }}
        WAIT_TIMEOUT: ${{ inputs.wait_timeout }}
      run: |
        echo "=================================================="
        echo "🔍 DRY RUN - deploy step skipped"
        echo "=================================================="
        if [ "$MODE" = "gitops" ]; then
          echo "Skipped: Commit changes for GitOps (skyhook-io/git-sync-commit@v1)"
          echo "  path: $WORKING_DIRECTORY"
          echo "  commit_message: $COMMIT_MESSAGE"
          echo "  file_pattern: $OVERLAY_DIR/*"
        elif [ "$MODE" = "kubectl" ]; then
          echo "Skipped: Apply with kubectl (skyhook-io/kustomize-apply@v1)"
          echo "  overlay_dir: $WORKING_DIRECTORY/$OVERLAY_DIR"
          echo "  namespace: $NAMESPACE"
          echo "  workloads_json: $WORKLOADS_JSON"
          echo "  wait: true"
          echo "  wait_timeout: $WAIT_TIMEOUT"
        else
          echo "Skipped: deploy step (mode=$MODE)"
        fi
        echo "=================================================="